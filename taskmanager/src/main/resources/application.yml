server:
  port: 8080

spring:
  application:
    name: taskmanager-sharafatdin-talgatbek

  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanagerdb
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:SharafatdinTalgatbekSecretKeyForJWTTokenGeneration2024VeryLongKey}
    expiration: 86400000
    refresh-expiration: 604800000

  upload:
    dir: ${UPLOAD_DIR:./uploads}

  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sharafatdin.talgatbek: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/taskmanager.log
